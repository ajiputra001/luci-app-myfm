name: Release OpenWrt Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget zstd

      - name: Download OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "https://downloads.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          [ -n "$SDK_DIR" ]
          mv "$SDK_DIR" sdk

      - name: Copy package
        run: |
          rm -rf sdk/package/luci-app-myfm
          mkdir -p sdk/package/luci-app-myfm
          cp -r package/luci-app-myfm/* sdk/package/luci-app-myfm/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-myfm/compile V=s

      - name: Collect files
        run: |
          mkdir -p dist
          find sdk/bin -type f -name "*.apk" -exec cp {} dist/ \; || true
          find sdk/bin -type f -name "*.ipk" -exec cp {} dist/ \; || true
          APK_FILE="$(find dist -maxdepth 1 -type f -name 'luci-app-myfm*.apk' | head -n 1)"
          if [ -n "$APK_FILE" ]; then cp "$APK_FILE" dist/luci-app-myfm.apk; fi
          ls -lah dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
