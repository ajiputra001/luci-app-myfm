cd ~/projects/luci-app-myfm/.github/workflows

cat > release.yml <<'EOF'
name: Release OpenWrt APK Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PKG_NAME: luci-app-myfm
  SDK_URL: https://downloads.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 rsync unzip zstd file wget

      - name: Download OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "${SDK_URL}"
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          [ -n "$SDK_DIR" ]
          mv "$SDK_DIR" sdk

      - name: Copy package
        run: |
          rm -rf "sdk/package/${PKG_NAME}"
          mkdir -p "sdk/package/${PKG_NAME}"
          cp -r "package/${PKG_NAME}/"* "sdk/package/${PKG_NAME}/"

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package
        working-directory: sdk
        run: |
          make defconfig
          make "package/${PKG_NAME}/compile" V=s

      - name: Collect release files
        run: |
          mkdir -p dist
          find sdk/bin -type f \( -name "*.apk" -o -name "*.ipk" \) -exec cp -v {} dist/ \;
          ls -lah dist

      - name: Rename main package
        run: |
          APK_FILE="$(find dist -maxdepth 1 -type f -name 'luci-app-myfm*.apk' | head -n 1)"
          if [ -n "$APK_FILE" ]; then
            cp -v "$APK_FILE" dist/luci-app-myfm.apk
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
EOF
