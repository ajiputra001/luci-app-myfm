name: Build OpenWrt Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget zstd

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar --zstd -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-* sdk

      - name: Copy package
        run: |
          cp -r package/luci-app-myfm sdk/package/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-myfm/compile V=s

      - name: Collect output
        run: |
          mkdir dist
          find sdk/bin -type f -name "*.apk" -exec cp {} dist/ \; || true
          find sdk/bin -type f -name "*.ipk" -exec cp {} dist/ \; || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-myfm
          path: dist/*
